<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MENTOR Terminal</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050807;
        --panel: #07110d;
        --line: #123326;
        --text: #d7ffe9;
        --muted: #71a889;
        --green: #00ff88;
        --green-soft: rgba(0, 255, 136, 0.14);
        --red: #ff5f56;
        --yellow: #ffbd2e;
        --blue: #4db8ff;
        --scan-opacity: 0.55;
        --wash: rgba(0,255,136,0.05);
      }
      body[data-theme="homebrew"] {
        --bg: #0c0804;
        --panel: #130c06;
        --line: #4a2a12;
        --text: #ffe3b8;
        --muted: #c9894a;
        --green: #f39c3d;
        --green-soft: rgba(243, 156, 61, 0.16);
        --yellow: #ffd166;
        --blue: #ffb454;
        --wash: rgba(243, 156, 61, 0.08);
      }
      body[data-theme="space"] {
        --bg: #020414;
        --panel: #070a24;
        --line: #26326e;
        --text: #e7e9ff;
        --muted: #8d98d6;
        --green: #9d7cff;
        --green-soft: rgba(157, 124, 255, 0.15);
        --yellow: #ffd6ff;
        --blue: #6be7ff;
        --wash: rgba(107, 231, 255, 0.07);
      }
      body[data-theme="toystory"] {
        --bg: #071b44;
        --panel: #0b2b69;
        --line: #f4c430;
        --text: #fff8d8;
        --muted: #8ed7ff;
        --green: #f43f3f;
        --green-soft: rgba(244, 63, 63, 0.16);
        --yellow: #ffd84d;
        --blue: #42c7ff;
        --wash: rgba(255, 216, 77, 0.08);
      }
      body[data-theme="matrix"] {
        --bg: #000;
        --panel: #020602;
        --line: #063d16;
        --text: #d4ffd4;
        --muted: #4aa35c;
        --green: #39ff14;
        --green-soft: rgba(57, 255, 20, 0.13);
        --yellow: #baff70;
        --blue: #68ff98;
        --wash: rgba(57, 255, 20, 0.06);
      }
      body[data-theme="cyberpunk"] {
        --bg: #110016;
        --panel: #1d0626;
        --line: #ff2bd6;
        --text: #fff1ff;
        --muted: #b98cff;
        --green: #00f5ff;
        --green-soft: rgba(0, 245, 255, 0.14);
        --yellow: #fff200;
        --blue: #ff2bd6;
        --wash: rgba(255, 43, 214, 0.08);
      }
      body[data-theme="paper"] {
        color-scheme: light;
        --bg: #f7f4ec;
        --panel: #fffaf0;
        --line: #d8ccb9;
        --text: #201b14;
        --muted: #776b5e;
        --green: #0f6b45;
        --green-soft: rgba(15, 107, 69, 0.12);
        --yellow: #9b6b16;
        --blue: #265f89;
        --scan-opacity: 0.16;
        --wash: rgba(15, 107, 69, 0.05);
      }
      * { box-sizing: border-box; }
      html,
      body {
        min-height: 100%;
      }
      body {
        margin: 0;
        min-height: 100svh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: "JetBrains Mono", "Fira Code", "SFMono-Regular", Consolas, monospace;
        letter-spacing: 0;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(rgba(255,255,255,0.025) 50%, rgba(0,0,0,0.08) 50%),
          linear-gradient(90deg, rgba(255,0,0,0.015), rgba(0,255,0,0.01), rgba(0,0,255,0.015));
        background-size: 100% 4px, 6px 100%;
        opacity: var(--scan-opacity);
      }
      .splash {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at 50% 32%, var(--green-soft), transparent 18rem),
          linear-gradient(180deg, var(--bg), #000 115%);
        transition: opacity 420ms ease, visibility 420ms ease;
      }
      .splash.is-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .splash-panel {
        width: min(520px, 100%);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 28px;
        background: rgba(0, 0, 0, 0.38);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.35);
      }
      .splash-mark {
        display: grid;
        gap: 8px;
      }
      .splash-kicker {
        color: var(--muted);
        font-size: 0.8rem;
      }
      .splash-title {
        margin: 0;
        color: var(--text);
        font-size: clamp(2.4rem, 9vw, 5rem);
        line-height: 0.9;
        letter-spacing: 0;
      }
      .splash-subtitle {
        margin: 0;
        color: var(--green);
        font-size: 0.95rem;
      }
      .boot-meter {
        position: relative;
        height: 8px;
        margin-top: 28px;
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
      }
      .boot-meter::after {
        content: "";
        position: absolute;
        inset: 0;
        width: 42%;
        border-radius: inherit;
        background: var(--green);
        animation: bootSweep 1.25s ease-in-out infinite;
      }
      @keyframes bootSweep {
        0% { transform: translateX(-110%); }
        100% { transform: translateX(250%); }
      }
      .terminal {
        min-height: 100vh;
        min-height: 100svh;
        height: 100vh;
        height: 100svh;
        display: grid;
        grid-template-rows: auto 1fr auto;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, var(--wash), transparent 18rem),
          var(--panel);
      }
      .topbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
        padding: max(12px, env(safe-area-inset-top)) 16px 12px;
        border-bottom: 1px solid var(--line);
        background: #07100c;
      }
      .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        display: inline-block;
      }
      .dot.red { background: var(--red); }
      .dot.yellow { background: var(--yellow); }
      .dot.green { background: var(--green); }
      .title {
        margin-left: 8px;
        min-width: 0;
        flex: 1 1 260px;
        color: var(--muted);
        font-size: 0.9rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .status {
        margin-left: auto;
        color: var(--green);
        font-size: 0.82rem;
      }
      .theme-picker {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-left: 12px;
        min-width: 0;
      }
      .theme-picker label {
        color: var(--muted);
        font-size: 0.78rem;
      }
      select {
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--green-soft);
        color: var(--text);
        font: inherit;
        font-size: 0.82rem;
        min-height: 44px;
        max-width: 180px;
        padding: 7px 9px;
      }
      .screen {
        min-height: 0;
        overflow: auto;
        padding: 18px 18px 24px;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
      }
      .line {
        max-width: 1100px;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        line-height: 1.55;
        font-size: 0.95rem;
      }
      .line + .line {
        margin-top: 12px;
      }
      .system {
        color: var(--muted);
      }
      .user {
        color: var(--text);
      }
      .assistant {
        color: var(--green);
      }
      .error {
        color: #ff8f86;
      }
      .prompt {
        color: var(--green);
      }
      .host {
        color: var(--blue);
      }
      .path {
        color: var(--yellow);
      }
      .inputbar {
        display: flex;
        gap: 10px;
        align-items: center;
        padding: 14px 18px max(18px, env(safe-area-inset-bottom));
        border-top: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.28);
      }
      .prompt-label {
        flex: 0 0 auto;
        color: var(--green);
        font-size: 0.95rem;
      }
      input {
        width: 100%;
        min-width: 0;
        border: 1px solid transparent;
        outline: none;
        color: var(--text);
        background: var(--green-soft);
        border-radius: 6px;
        min-height: 46px;
        padding: 12px 12px;
        font: inherit;
      }
      input:focus {
        border-color: var(--green);
        box-shadow: 0 0 0 2px rgba(0, 255, 136, 0.12);
      }
      button {
        border: 1px solid var(--green);
        color: var(--green);
        background: transparent;
        border-radius: 6px;
        min-height: 46px;
        padding: 12px 14px;
        font: inherit;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: wait;
      }
      @media (max-width: 860px) {
        .topbar {
          align-items: center;
        }
        .status {
          margin-left: 0;
        }
        .theme-picker {
          flex: 1 1 calc(50% - 8px);
          margin-left: 0;
        }
        .theme-picker select {
          width: 100%;
          max-width: none;
        }
      }
      @media (max-width: 720px) {
        .topbar,
        .screen,
        .inputbar {
          padding-left: 12px;
          padding-right: 12px;
        }
        .topbar {
          gap: 8px;
        }
        .title {
          flex-basis: calc(100% - 90px);
          margin-left: 4px;
        }
        .status {
          flex: 0 0 auto;
          margin-left: auto;
        }
        .inputbar {
          display: grid;
          grid-template-columns: 1fr auto;
        }
        .prompt-label {
          grid-column: 1 / -1;
        }
        .line,
        .prompt-label,
        input,
        button {
          font-size: 0.88rem;
        }
        .theme-picker label {
          display: none;
        }
      }
      @media (max-width: 480px) {
        .dot {
          width: 10px;
          height: 10px;
        }
        .title {
          flex-basis: calc(100% - 70px);
          font-size: 0.78rem;
        }
        .status {
          font-size: 0.74rem;
        }
        .theme-picker {
          flex-basis: calc(50% - 4px);
        }
        select {
          font-size: 0.78rem;
          padding: 7px 8px;
        }
        .screen {
          padding-top: 12px;
          padding-bottom: 18px;
        }
        .line,
        .prompt-label,
        input,
        button {
          font-size: 0.84rem;
        }
        button {
          padding-left: 11px;
          padding-right: 11px;
        }
      }
      @media (max-height: 520px) and (orientation: landscape) {
        .topbar {
          padding-top: 8px;
          padding-bottom: 8px;
        }
        .inputbar {
          padding-top: 10px;
          padding-bottom: max(10px, env(safe-area-inset-bottom));
        }
        .line {
          line-height: 1.45;
        }
      }
    </style>
  </head>
  <body>
    <div id="splash" class="splash" role="status" aria-live="polite">
      <div class="splash-panel">
        <div class="splash-mark">
          <span class="splash-kicker">initializing terminal</span>
          <h1 class="splash-title">MENTOR</h1>
          <p class="splash-subtitle">secure session ready</p>
        </div>
        <div class="boot-meter" aria-hidden="true"></div>
      </div>
    </div>
    <main class="terminal" aria-label="MENTOR terminal">
      <header class="topbar">
        <span class="dot red"></span>
        <span class="dot yellow"></span>
        <span class="dot green"></span>
        <span class="title">mentor:/terminal</span>
        <div class="theme-picker">
          <label for="theme">theme</label>
          <select id="theme" name="theme" aria-label="Terminal theme">
            <option value="kali">Kali</option>
            <option value="homebrew">Homebrew</option>
            <option value="space">Space</option>
            <option value="toystory">Toy Story</option>
            <option value="matrix">Matrix</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="paper">Paper</option>
          </select>
        </div>
        <div class="theme-picker">
          <label for="language">language</label>
          <select id="language" name="language" aria-label="Output language">
            <option value="default">Default</option>
            <option value="Burmese">Burmese</option>
            <option value="Chinese">Chinese</option>
            <option value="Japanese">Japanese</option>
            <option value="Thai">Thai</option>
            <option value="Korean">Korean</option>
            <option value="Spanish">Spanish</option>
            <option value="French">French</option>
            <option value="German">German</option>
            <option value="Hindi">Hindi</option>
          </select>
        </div>
        <span id="status" class="status">online</span>
      </header>
      <section id="screen" class="screen" aria-live="polite"></section>
      <form id="form" class="inputbar" autocomplete="off">
        <label class="prompt-label" for="command"><span class="host">root@mentor</span>:<span class="path">~/terminal</span>#</label>
        <input id="command" name="command" type="text" spellcheck="false" autofocus placeholder="type /help or ask anything">
        <button id="send" type="submit">run</button>
      </form>
    </main>

    <script>
      const CLIENT_ID_KEY = "cookai_terminal_client_id";
      const WEB_CHAT_TOKEN = {{ csrf_token|tojson }};
      const form = document.querySelector("#form");
      const input = document.querySelector("#command");
      const screen = document.querySelector("#screen");
      const splash = document.querySelector("#splash");
      const status = document.querySelector("#status");
      const send = document.querySelector("#send");
      const theme = document.querySelector("#theme");
      const language = document.querySelector("#language");
      const history = [];
      let historyIndex = 0;
      const THEME_KEY = "cookai_terminal_theme";
      const LANGUAGE_KEY = "cookai_terminal_language";
      const CHAT_LOG_KEY = "cookai_terminal_chat_log";
      const CHAT_LOG_LIMIT = 120;
      const THEMES = new Set(["kali", "homebrew", "space", "toystory", "matrix", "cyberpunk", "paper"]);
      const LANGUAGE_OPTIONS = new Set([...language.options].map((option) => option.value.toLowerCase()));

      function getClientId() {
        const existing = localStorage.getItem(CLIENT_ID_KEY);
        if (existing) return existing;
        const generated = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
        localStorage.setItem(CLIENT_ID_KEY, generated);
        return generated;
      }

      function readChatLog() {
        try {
          const saved = JSON.parse(localStorage.getItem(CHAT_LOG_KEY) || "[]");
          if (!Array.isArray(saved)) return [];
          return saved.filter((item) => item && typeof item.className === "string" && typeof item.text === "string");
        } catch {
          return [];
        }
      }

      function writeChatLog(lines) {
        localStorage.setItem(CHAT_LOG_KEY, JSON.stringify(lines.slice(-CHAT_LOG_LIMIT)));
      }

      function saveChatLine(className, text) {
        if (className === "system") return;
        const lines = readChatLog();
        lines.push({ className, text, createdAt: Date.now() });
        writeChatLog(lines);
      }

      function appendLine(className, text, persist = false) {
        const line = document.createElement("div");
        line.className = `line ${className}`;
        line.textContent = text;
        screen.appendChild(line);
        screen.scrollTop = screen.scrollHeight;
        if (persist) saveChatLine(className, text);
      }

      function appendUserLine(command) {
        const line = document.createElement("div");
        line.className = "line user";

        const host = document.createElement("span");
        host.className = "host";
        host.textContent = "root@mentor";

        const path = document.createElement("span");
        path.className = "path";
        path.textContent = "~/terminal";

        const prompt = document.createElement("span");
        prompt.className = "prompt";
        prompt.textContent = "#";

        line.append(host, ":", path, prompt, ` ${command}`);
        screen.appendChild(line);
        screen.scrollTop = screen.scrollHeight;
        saveChatLine("user", `root@mentor:~/terminal# ${command}`);
      }

      function restoreChatLog() {
        const lines = readChatLog();
        if (!lines.length) return;
        for (const item of lines) {
          appendLine(item.className, item.text);
        }
        appendLine("system", `restored ${lines.length} local chat lines`);
      }

      function setBusy(isBusy) {
        send.disabled = isBusy;
        input.disabled = isBusy;
        status.textContent = isBusy ? "running" : "online";
      }

      function applyTheme(name, announce = false) {
        const selected = THEMES.has(name) ? name : "kali";
        document.body.dataset.theme = selected;
        theme.value = selected;
        localStorage.setItem(THEME_KEY, selected);
        if (announce) appendLine("system", `theme set: ${selected}`);
      }

      function normalizeLanguageName(name) {
        const clean = String(name || "").trim();
        if (!clean || clean.toLowerCase() === "english" || clean.toLowerCase() === "auto") return "default";
        if (clean.toLowerCase() === "burmese" || clean.toLowerCase() === "myanmar") return "Burmese";
        if (clean.toLowerCase() === "chinese" || clean.toLowerCase() === "mandarin") return "Chinese";
        return clean;
      }

      function applyLanguage(name, announce = false) {
        const selected = normalizeLanguageName(name);
        const optionValue = LANGUAGE_OPTIONS.has(selected.toLowerCase()) ? selected : "default";
        language.value = optionValue;
        localStorage.setItem(LANGUAGE_KEY, selected);
        if (announce) appendLine("system", `language set: ${selected}`);
      }

      function getCurrentLanguage() {
        return localStorage.getItem(LANGUAGE_KEY) || "default";
      }

      async function readApiResponse(response) {
        const contentType = response.headers.get("content-type") || "";
        if (contentType.includes("application/json")) {
          return response.json();
        }

        const body = await response.text();
        const preview = body.replace(/\s+/g, " ").trim().slice(0, 120);
        if (response.status === 403) {
          return { ok: false, reply: "Request blocked by website security. Refresh the page and try again." };
        }
        if (response.status === 429 || response.status === 503) {
          return { ok: false, reply: "Too many requests. Wait a moment, then try again." };
        }
        return {
          ok: false,
          reply: `API returned ${response.status || "an invalid response"} instead of JSON.${preview ? ` ${preview}` : ""}`,
        };
      }

      async function sendCommand(command) {
        if (command === "/clear") {
          screen.textContent = "";
          localStorage.removeItem(CHAT_LOG_KEY);
          appendLine("system", "local chat history cleared");
          return;
        }
        if (command.startsWith("/theme")) {
          const selected = command.split(/\s+/, 2)[1];
          if (!selected) {
            appendLine("system", "themes: kali, homebrew, space, toystory, matrix, cyberpunk, paper");
            return;
          }
          applyTheme(selected.toLowerCase(), true);
          return;
        }
        if (command === "/english") {
          applyLanguage("default", true);
        } else if (command.startsWith("/burmese")) {
          applyLanguage("Burmese", !command.includes(" "));
        } else if (command.startsWith("/chinese")) {
          applyLanguage("Chinese", !command.includes(" "));
        } else if (command.startsWith("/language")) {
          const selected = command.replace(/^\/language\s*/i, "");
          if (selected) applyLanguage(selected, true);
        }

        setBusy(true);
        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-CSRF-Token": WEB_CHAT_TOKEN },
            body: JSON.stringify({ message: command, client_id: getClientId(), language: getCurrentLanguage() }),
          });
          const payload = await readApiResponse(response);
          const className = payload.ok ? "assistant" : "error";
          appendLine(className, payload.reply || "Empty response.", true);
        } catch (error) {
          appendLine("error", `network error: ${String(error)}`, true);
        } finally {
          setBusy(false);
          input.focus();
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const command = input.value.trim();
        if (!command) return;
        appendUserLine(command);
        history.push(command);
        historyIndex = history.length;
        input.value = "";
        sendCommand(command);
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "ArrowUp") {
          event.preventDefault();
          historyIndex = Math.max(0, historyIndex - 1);
          input.value = history[historyIndex] || "";
          return;
        }
        if (event.key === "ArrowDown") {
          event.preventDefault();
          historyIndex = Math.min(history.length, historyIndex + 1);
          input.value = history[historyIndex] || "";
        }
      });

      theme.addEventListener("change", () => {
        applyTheme(theme.value, true);
        input.focus();
      });
      language.addEventListener("change", () => {
        applyLanguage(language.value, true);
        input.focus();
      });

      applyTheme(localStorage.getItem(THEME_KEY) || "kali");
      applyLanguage(localStorage.getItem(LANGUAGE_KEY) || "default");
      appendLine("system", "MENTOR Terminal");
      appendLine("system", "type /help to list commands, /clear to clean the screen, /theme to list themes, /language to choose output language");
      restoreChatLog();
      window.setTimeout(() => {
        splash.classList.add("is-hidden");
        input.focus();
      }, 1450);
    </script>
  </body>
</html>
