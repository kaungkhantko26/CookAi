<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access Denied</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --panel: #111;
        --line: #35ff69;
        --text: #eaffef;
        --muted: #70a87b;
        --hot: #ff317a;
        --warn: #ffe85c;
      }
      * { box-sizing: border-box; }
      html, body { min-height: 100%; }
      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(rgba(255,255,255,0.03) 50%, rgba(0,0,0,0.16) 50%),
          radial-gradient(circle at center, rgba(53,255,105,0.12), transparent 34rem),
          var(--bg);
        background-size: 100% 4px, auto, auto;
        color: var(--text);
        font-family: "Press Start 2P", "Courier New", monospace;
        letter-spacing: 0;
        image-rendering: pixelated;
        padding: 20px;
      }
      .screen {
        width: min(100%, 760px);
        border: 4px solid var(--line);
        background: var(--panel);
        box-shadow: 0 0 0 8px #000, 0 0 48px rgba(53,255,105,0.24);
        padding: clamp(20px, 5vw, 44px);
        text-align: center;
      }
      .face {
        width: 152px;
        height: 152px;
        margin: 0 auto 28px;
        position: relative;
        background: var(--warn);
        border: 8px solid #000;
        box-shadow:
          16px 0 0 #000,
          -16px 0 0 #000,
          0 16px 0 #000,
          0 -16px 0 #000;
      }
      .eye {
        position: absolute;
        top: 44px;
        width: 28px;
        height: 28px;
        background: #000;
        animation: blink 1.8s steps(1) infinite;
      }
      .eye.left { left: 34px; }
      .eye.right { right: 34px; }
      .mouth {
        position: absolute;
        left: 34px;
        right: 34px;
        bottom: 34px;
        height: 24px;
        background: #000;
        box-shadow: 0 16px 0 #000;
      }
      h1 {
        margin: 0;
        color: var(--hot);
        font-size: clamp(1.15rem, 4.4vw, 2rem);
        line-height: 1.45;
        text-transform: uppercase;
      }
      p {
        margin: 22px auto 0;
        max-width: 46rem;
        color: var(--muted);
        font-size: clamp(0.72rem, 2.4vw, 0.95rem);
        line-height: 1.8;
      }
      .laugh {
        margin-top: 26px;
        color: var(--line);
        animation: shake 420ms steps(2) infinite;
      }
      @keyframes blink {
        0%, 84%, 100% { height: 28px; }
        85%, 92% { height: 8px; transform: translateY(10px); }
      }
      @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-4px); }
        75% { transform: translateX(4px); }
      }
    </style>
  </head>
  <body>
    <main class="screen" aria-label="Honeypot access denied">
      <div class="face" aria-hidden="true">
        <span class="eye left"></span>
        <span class="eye right"></span>
        <span class="mouth"></span>
      </div>
      <h1>You are so dumb haha</h1>
      <p>This fake admin door is a honeypot. Your request has been logged.</p>
      <p class="laugh">HAHA HAHA HAHA</p>
    </main>
  </body>
</html>
