server {
    listen 80;
    server_name bot.kaungkhantko.top kaungkhantko.studio www.kaungkhantko.studio;
    server_tokens off;

    if ($host ~* ^(www\.)?kaungkhantko\.studio$) {
        return 410;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name bot.kaungkhantko.top;
    server_tokens off;
    client_max_body_size 16k;

    ssl_certificate /etc/letsencrypt/live/bot.kaungkhantko.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.kaungkhantko.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:bot_ssl:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    proxy_hide_header X-Content-Type-Options;
    proxy_hide_header X-Frame-Options;
    proxy_hide_header X-XSS-Protection;
    proxy_hide_header X-Permitted-Cross-Domain-Policies;
    proxy_hide_header Cross-Origin-Opener-Policy;
    proxy_hide_header Cross-Origin-Resource-Policy;
    proxy_hide_header Strict-Transport-Security;
    proxy_hide_header Content-Security-Policy;
    proxy_hide_header Referrer-Policy;
    proxy_hide_header Permissions-Policy;

    location ~* \.(bak|backup|old|orig|save|swp|tmp|test|sql|sqlite|db|env|ini|log|conf)$ {
        return 404;
    }

    location /api/chat {
        default_type application/json;
        return 410 '{"ok":false,"reply":"Website chat has been removed."}';
    }

    location / {
        proxy_pass http://127.0.0.1:5060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
    }
}

server {
    listen 443 ssl http2;
    server_name kaungkhantko.studio www.kaungkhantko.studio;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/kaungkhantko.studio/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kaungkhantko.studio/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:studio_ssl:10m;
    ssl_session_timeout 1d;

    return 410;
}
