<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Terminal Chat - MENTOR</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <main class="terminal-chat" aria-label="MENTOR terminal chat">
      <header class="chat-topbar">
        <div class="window-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
        <span class="chat-title">KaungKhantKo AI Terminal</span>
        <a class="button secondary" href="dashboard.html">Dashboard</a>
      </header>
      <section id="chatScreen" class="chat-screen" aria-live="polite"></section>
      <form id="chatForm" class="chat-inputbar" autocomplete="off">
        <label class="prompt" for="chatInput">root@mentor:~/chat#</label>
        <input id="chatInput" type="text" spellcheck="false" autofocus placeholder="type /help or ask anything">
        <button id="chatSend" type="submit">run</button>
      </form>
    </main>
    <script>
      const API_URL = "https://bot.kaungkhantko.top/api/chat";
      const CLIENT_ID_KEY = "mentor_terminal_client_id";
      const LOG_KEY = "mentor_terminal_log";
      const screen = document.querySelector("#chatScreen");
      const form = document.querySelector("#chatForm");
      const input = document.querySelector("#chatInput");
      const send = document.querySelector("#chatSend");
      const promptHtml = '<span class="prompt">root@mentor:~/chat#</span>';

      function clientId() {
        const existing = localStorage.getItem(CLIENT_ID_KEY);
        if (existing) return existing;
        const generated = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
        localStorage.setItem(CLIENT_ID_KEY, generated);
        return generated;
      }

      function escapeHtml(value) {
        return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
      }

      function readLog() {
        try { return JSON.parse(localStorage.getItem(LOG_KEY) || "[]"); } catch { return []; }
      }

      function writeLog(lines) {
        localStorage.setItem(LOG_KEY, JSON.stringify(lines.slice(-100)));
      }

      function line(kind, html, persist = false) {
        const node = document.createElement("div");
        node.className = `chat-line ${kind}`;
        node.innerHTML = html;
        screen.appendChild(node);
        screen.scrollTop = screen.scrollHeight;
        if (persist) {
          const log = readLog();
          log.push({ kind, html });
          writeLog(log);
        }
      }

      function setBusy(value) {
        input.disabled = value;
        send.disabled = value;
      }

      async function run(command) {
        if (command === "/clear") {
          screen.innerHTML = "";
          localStorage.removeItem(LOG_KEY);
          line("system", "terminal cleared");
          return;
        }
        setBusy(true);
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: command, client_id: clientId(), language: "default" })
          });
          const payload = await response.json();
          line(payload.ok === false ? "error" : "assistant", escapeHtml(payload.reply || "Empty response."), true);
        } catch (error) {
          line("error", `network error: ${escapeHtml(error.message || String(error))}`, true);
        } finally {
          setBusy(false);
          input.focus();
        }
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const command = input.value.trim();
        if (!command) return;
        line("user", `${promptHtml} ${escapeHtml(command)}`, true);
        input.value = "";
        run(command);
      });

      line("system", "KaungKhantKo AI Terminal");
      line("system", "type /help to list commands, /clear to clean the screen");
      for (const item of readLog()) line(item.kind, item.html);
    </script>
  </body>
</html>
