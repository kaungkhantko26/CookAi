<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Kaung Study OS</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body>
    <main class="login-shell">
      <form class="login-card" action="dashboard.html">
        <div class="window-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
        <h1>Login / signup</h1>
        <p class="muted">Open your student dashboard. Firebase Auth can replace this static entry when connected.</p>
        <label for="email">Email</label>
        <input id="email" type="email" value="kaung@example.com">
        <label for="password">Password</label>
        <input id="password" type="password" value="password">
        <button type="submit">Open dashboard</button>
      </form>
    </main>
  </body>
</html>
