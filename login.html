<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Access - MENTOR</title>
    <link rel="stylesheet" href="app.css">
  </head>
  <body data-page="login">
    <main class="login-shell">
      <form id="hashForm" class="login-card">
        <div class="window-dots"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
        <h1>MENTOR</h1>
        <p class="muted">Enter the one-time access hash from Kaung. Hashes are created from the admin bot or dashboard and can only be used once.</p>
        <label for="accessHash">Access hash</label>
        <input id="accessHash" type="text" autocomplete="one-time-code" placeholder="A1B2C3D4E5" required>
        <div class="actions">
          <button type="submit">Unlock this device</button>
          <a class="button secondary" href="chat.html" target="_blank" rel="noopener">Terminal chat</a>
        </div>
        <p id="loginStatus" class="muted"></p>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
